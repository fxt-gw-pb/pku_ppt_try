<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PKU 红 · 论文答辩 / 开题报告 模板</title>

  <link rel="stylesheet" href="assets/theme-pku-red.css">
  <link rel="stylesheet" href="assets/base.css">

  <style>
    /* Make sure the dark page background frames the deck nicely */
    body { background: #1a1a1a; }
    /* Tighten deck-stage's own letterbox color */
    deck-stage { --letterbox-bg: #1a1a1a; }
  </style>
</head>
<body>

  <!-- Deck shell. The runtime injects <section> children into this stage. -->
  <deck-stage width="1280" height="720" data-deck="data/slides.json">
    <!-- Skeleton splash before runtime renders -->
    <section class="slide" style="display:flex;align-items:center;justify-content:center;background:#9A0000;color:#fff;font-family:'Source Han Sans SC','Noto Sans SC','PingFang SC',sans-serif">
      <div style="text-align:center">
        <div style="font-size:28px;letter-spacing:0.4em;opacity:0.7">LOADING</div>
        <div style="margin-top:14px;font-size:48px;font-weight:800;letter-spacing:0.06em">PKU · 论文答辩模板</div>
      </div>
    </section>
  </deck-stage>

  <script src="deck-stage.js"></script>
  <script src="assets/runtime.js"></script>
</body>
</html>
